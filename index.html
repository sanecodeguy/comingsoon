<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>Contagion | Coming Soon</title>
    <meta name="description" content="Contagion - A mysterious project launching soon. Stay tuned for updates." />
    <meta name="keywords" content="contagion, coming soon, project, launch" />
    <meta name="author" content="Contagion" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://contagion.dev/" />
    <meta property="og:title" content="Contagion | Coming Soon" />
    <meta property="og:description" content="Contagion - A mysterious project launching soon. Stay tuned for updates." />
    <meta property="og:image" content="https://yourdomain.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Contagion | Coming Soon" />

    <meta name="twitter:image" content="https://contagion.dev/og-image.png" />

    <!-- Canonical URL -->

    <!-- Preconnect for Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Website",
      "name": "Contagion",
      "description": "Contagion - A mysterious project launching soon. Stay tuned for updates.",
      "url": "https://contagion.dev/",
      "creator": {

        "name": "Contagion"
      }
    }

  </head>
